name: Prerelease

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: prerelease-main
  cancel-in-progress: true

jobs:
  linux-prerelease:
    name: Build and update Linux prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Lint
        shell: bash
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: nix run .#lint --print-build-logs

      - name: Test
        shell: bash
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: nix run .#tests --print-build-logs

      - name: Build prerelease bundle
        shell: bash
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: nix run .#prerelease-bundle --print-build-logs

      - name: Move prerelease tag to current commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = "tags/prerelease";

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref,
              });

              await github.rest.git.updateRef({
                owner,
                repo,
                ref,
                sha: context.sha,
                force: true,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/${ref}`,
                sha: context.sha,
              });
            }

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prerelease
          target_commitish: ${{ github.sha }}
          name: prerelease
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: dist/cicest-x86_64-linux.tar.gz
