name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  nix-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run test suite
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: bash .github/scripts/run-tests.sh

