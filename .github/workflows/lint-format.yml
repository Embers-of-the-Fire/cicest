name: Lint and Format

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-format:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            clang-format \
            llvm-dev \
            libxml2-dev \
            libffi-dev \
            zlib1g-dev

      - name: Lint and format check
        shell: bash
        run: bash .github/scripts/run-lint-format.sh
